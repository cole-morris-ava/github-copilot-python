<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sudoku Game</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <h1>Sudoku Game</h1>
  <div id="sudoku-board"></div>
  <div class="controls">
    <div class="controls-row">
      <label for="difficulty">Difficulty</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="theme-toggle" type="button">🌙 Dark Mode</button>
      <button id="new-game" type="button">New Game</button>
      <button id="hint-button" type="button">Hint</button>
      <button id="check-solution" type="button">Check Solution</button>
    </div>
    <div class="message-area" aria-live="polite">
      <span id="message"></span>
    </div>
  </div>
  <div class="status-panel">
    <div id="timer" class="timer">Time: 00:00</div>
    <div class="leaderboard">
      <h2>Top 10 Fastest Times</h2>
      <table id="leaderboard-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Time</th>
            <th>Difficulty</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>
  </div>
  <script src="/static/main.js"></script>
</body>
</html>
